<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aquarium · Real-time</title>
<style>
  :root {
    --ink: #eaf3ff;
    --ink-dim: #9fb6c9;
    --accent: #6ad6ff;
    --warm: #ffb070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    touch-action: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .hud { position: fixed; pointer-events: none; user-select: none; z-index: 5; }
  .hud-tl { top: 22px; left: 24px; max-width: 360px; }
  .hud-tl .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(8, 18, 28, 0.55);
    border: 1px solid rgba(106, 214, 255, 0.25);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .hud-tl .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
  }
  .hud-tl h1 {
    margin-top: 10px; font-size: 30px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.1;
  }
  .hud-tl h1 span {
    background: linear-gradient(90deg, #6ad6ff 0%, #b6f0ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hud-tl p {
    margin-top: 8px; font-size: 12px;
    color: var(--ink-dim); line-height: 1.5;
  }

  .hud-tr, .hud-tr2 { display: flex; gap: 8px; pointer-events: auto; }
  .hud-tr { top: 22px; right: 24px; }
  .hud-tr2 { top: 70px; right: 24px; }
  .pill {
    pointer-events: auto;
    padding: 8px 12px; border-radius: 10px;
    background: rgba(8, 18, 28, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: var(--ink); font-size: 12px; cursor: pointer;
    transition: all 0.18s ease;
  }
  .pill:hover { border-color: rgba(106, 214, 255, 0.4); color: var(--accent); }
  .pill.active {
    background: rgba(106, 214, 255, 0.12);
    border-color: rgba(106, 214, 255, 0.5);
    color: var(--accent);
  }
  .pill .ico { display: inline-block; margin-right: 4px; opacity: 0.7; }

  .hud-br {
    bottom: 22px; right: 24px;
    font-size: 11px; color: var(--ink-dim);
    text-align: right; line-height: 1.6; letter-spacing: 0.04em;
  }
  .hud-br kbd {
    font-family: inherit;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 1px 6px;
    font-size: 10px; color: var(--ink);
  }

  .hud-bl { bottom: 22px; left: 24px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; max-width: 60vw; }
  .stat {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: rgba(8, 18, 28, 0.55);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border-radius: 8px; font-size: 11px; color: var(--ink-dim);
  }
  .stat b { color: var(--ink); font-weight: 500; }

  .toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    padding: 14px 22px; border-radius: 12px;
    background: rgba(8, 18, 28, 0.7);
    border: 1px solid rgba(106, 214, 255, 0.3);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: var(--ink); font-size: 14px;
    opacity: 0; transition: opacity 0.4s, transform 0.4s;
    z-index: 6; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0a1620 0%, #000 100%);
    z-index: 10; transition: opacity 0.8s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 48px; height: 48px;
    border: 2px solid rgba(106, 214, 255, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="app"></div>
  <div class="loader" id="loader"><div class="loader-ring"></div></div>

  <div class="hud hud-tl">
    <div class="badge"><span class="dot"></span> Live · Real-time</div>
    <h1>Аквариум <span>real-time</span></h1>
    <p>Three.js · PBR стекло · boids · GLSL каустика · объёмные лучи · WebAudio.</p>
  </div>

  <div class="hud hud-tr">
    <button class="pill active" data-mode="orbit"><span class="ico">⊙</span>Осмотр</button>
    <button class="pill" data-mode="auto"><span class="ico">↻</span>Авто-тур</button>
    <button class="pill" data-mode="dive"><span class="ico">↓</span>Внутрь</button>
  </div>
  <div class="hud hud-tr2">
    <button class="pill" data-action="feed"><span class="ico">✦</span>Покормить</button>
    <button class="pill" data-action="day"><span class="ico">☀</span>День</button>
    <button class="pill" data-action="audio"><span class="ico">♪</span>Звук</button>
  </div>

  <div class="hud hud-bl" id="stats">
    <div class="stat">Рыб <b id="s-fish">—</b></div>
    <div class="stat">Пузырьков <b id="s-bubbles">—</b></div>
    <div class="stat">FPS <b id="s-fps">—</b></div>
    <div class="stat">Трисов <b id="s-tris">—</b></div>
  </div>

  <div class="hud hud-br">
    <kbd>ЛКМ</kbd> вращать &nbsp; <kbd>колесо</kbd> зум &nbsp; <kbd>ПКМ</kbd> пан &nbsp; <kbd>клик</kbd> на рыбу
  </div>

  <div class="toast" id="toast">…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ===========================================================================
// Utility
// ===========================================================================
const rand = (a, b) => a + Math.random() * (b - a);
const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// ===========================================================================
// Renderer / scene / camera
// ===========================================================================
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a10);
scene.fog = new THREE.FogExp2(0x0a2030, 0.05);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(7, 4.5, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 1.6, 0);
controls.minDistance = 2.5;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minPolarAngle = Math.PI * 0.18;

// ===========================================================================
// Room (wood floor + table)
// ===========================================================================
{
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x180f08, roughness: 0.9, metalness: 0 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), floorMat);
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

  // Procedural wood table top with grain
  const woodGeo = new THREE.BoxGeometry(6.8, 0.2, 3.4, 1, 1, 1);
  const woodMat = new THREE.MeshStandardMaterial({ color: 0x3a2010, roughness: 0.55, metalness: 0.05 });
  woodMat.onBeforeCompile = (sh) => {
    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\nvarying vec3 vWood;`).replace('#include <begin_vertex>', `#include <begin_vertex>\nvWood = position;`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <common>', `#include <common>\nvarying vec3 vWood;\nfloat hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);} float fbm(vec2 p){float v=0.,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}`).replace('#include <color_fragment>', `#include <color_fragment>\nfloat grain = fbm(vec2(vWood.x*0.5+vWood.z*0.3, vWood.z*1.2))*1.4;\nfloat rings = abs(sin(vWood.x*0.6 + grain*3.0));\ndiffuseColor.rgb = mix(vec3(0.18,0.10,0.05), vec3(0.32,0.20,0.10), rings*0.7+grain*0.3);`);
  };
  const wood = new THREE.Mesh(woodGeo, woodMat);
  wood.position.y = 0.1; wood.castShadow = true; wood.receiveShadow = true; scene.add(wood);

  const legMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.6, metalness: 0.05 });
  for (const [x, z] of [[-3.1, -1.5], [3.1, -1.5], [-3.1, 1.5], [3.1, 1.5]]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.22, 1.5, 0.22), legMat);
    leg.position.set(x, -0.65, z); leg.castShadow = true; scene.add(leg);
  }
}

// ===========================================================================
// Tank
// ===========================================================================
const TANK = { w: 5.4, h: 3.2, d: 2.6, baseY: 0.2 };
const waterTop = TANK.baseY + TANK.h;
const waterBottom = TANK.baseY + 0.05;
const tankGroup = new THREE.Group();
scene.add(tankGroup);

const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xbfeaff, transmission: 1.0, thickness: 0.4,
  roughness: 0.02, metalness: 0, ior: 1.5,
  attenuationColor: new THREE.Color(0xa0d8ff), attenuationDistance: 8,
  clearcoat: 0.4, clearcoatRoughness: 0.05, envMapIntensity: 1.0,
  transparent: true, side: THREE.DoubleSide
});
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x1c5a7a, transmission: 0.95, thickness: 1.0,
  roughness: 0.05, metalness: 0, ior: 1.33,
  attenuationColor: new THREE.Color(0x0a3a55), attenuationDistance: 3.5,
  transparent: true, side: THREE.BackSide, envMapIntensity: 0.6
});

(function buildTank() {
  const t = 0.04;
  const sides = [
    { g: new THREE.BoxGeometry(t, TANK.h, TANK.d), p: [-TANK.w/2, TANK.baseY+TANK.h/2, 0] },
    { g: new THREE.BoxGeometry(t, TANK.h, TANK.d), p: [ TANK.w/2, TANK.baseY+TANK.h/2, 0] },
    { g: new THREE.BoxGeometry(TANK.w, TANK.h, t), p: [0, TANK.baseY+TANK.h/2, -TANK.d/2] },
    { g: new THREE.BoxGeometry(TANK.w, TANK.h, t), p: [0, TANK.baseY+TANK.h/2,  TANK.d/2] },
    { g: new THREE.BoxGeometry(TANK.w, t, TANK.d), p: [0, TANK.baseY+TANK.h, 0] }
  ];
  for (const s of sides) {
    const m = new THREE.Mesh(s.g, glassMat);
    m.position.set(...s.p); tankGroup.add(m);
  }
  // inner water
  const innerW = TANK.w - 0.12, innerH = TANK.h - 0.05, innerD = TANK.d - 0.12;
  const wm = new THREE.Mesh(new THREE.BoxGeometry(innerW, innerH, innerD), waterMat);
  wm.position.set(0, TANK.baseY + innerH/2 + 0.04, 0);
  wm.renderOrder = -1; tankGroup.add(wm);

  // dark frame
  const fm = new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 0.5, metalness: 0.4 });
  const e = 0.06;
  const frame = [
    { g: new THREE.BoxGeometry(TANK.w+e*2, e, e), p: [0, waterTop+e/2, -TANK.d/2-e/2] },
    { g: new THREE.BoxGeometry(TANK.w+e*2, e, e), p: [0, waterTop+e/2,  TANK.d/2+e/2] },
    { g: new THREE.BoxGeometry(e, e, TANK.d+e*2), p: [-TANK.w/2-e/2, waterTop+e/2, 0] },
    { g: new THREE.BoxGeometry(e, e, TANK.d+e*2), p: [ TANK.w/2+e/2, waterTop+e/2, 0] },
    { g: new THREE.BoxGeometry(TANK.w+e*2, e, TANK.d+e*2), p: [0, waterTop+e/2, 0] }
  ];
  for (const f of frame) { const m = new THREE.Mesh(f.g, fm); m.position.set(...f.p); tankGroup.add(m); }
})();

// ===========================================================================
// Water surface (animated normals + transmission)
// ===========================================================================
{
  const surfaceGeo = new THREE.PlaneGeometry(TANK.w - 0.08, TANK.d - 0.08, 80, 40);
  const surfaceMat = new THREE.MeshPhysicalMaterial({
    color: 0x88c4ff, transmission: 0.9, thickness: 0.2,
    roughness: 0.05, metalness: 0, ior: 1.33,
    transparent: true, side: THREE.DoubleSide,
    clearcoat: 0.8, clearcoatRoughness: 0.1, envMapIntensity: 1.2
  });
  // animated normal via onBeforeCompile
  surfaceMat.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = { value: 0 };
    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\nvarying vec3 vWPos;`).replace('#include <worldpos_vertex>', `#include <worldpos_vertex>\nvWPos = worldPosition.xyz;`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <common>', `#include <common>\nuniform float uTime;\nvarying vec3 vWPos;\nfloat wn(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} float wnoise(vec2 p){vec2 i=floor(p),f=fract(p);return mix(mix(wn(i),wn(i+vec2(1,0)),f.x),mix(wn(i+vec2(0,1)),wn(i+vec2(1,1)),f.x),f.y);}`).replace('#include <normal_fragment_maps>', `#include <normal_fragment_maps>\nvec2 np = vWPos.xz*0.6;\nfloat n1 = wnoise(np + vec2(uTime*0.12, 0.0));\nfloat n2 = wnoise(np*1.8 + vec2(0.0, uTime*0.09));\nvec3 nOffset = vec3(n1-0.5, 0.0, n2-0.5)*0.3;\nnormal = normalize(normal + nOffset);`);
    surfaceMat.userData.shader = sh;
  };
  const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
  surface.rotation.x = -Math.PI / 2;
  surface.position.y = waterTop - 0.04;
  surface.userData.isSurface = true;
  tankGroup.add(surface);
  // store for animation
  tankGroup.userData.surface = surface;
}

// ===========================================================================
// Sand floor with caustics shader
// ===========================================================================
const causticsUniforms = { uTime: { value: 0 } };
{
  const sandGeo = new THREE.PlaneGeometry(TANK.w - 0.1, TANK.d - 0.1, 100, 50);
  const pos = sandGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    const h = Math.sin(x*1.5)*0.05 + Math.cos(y*2.0)*0.04 + Math.sin(x*3.1+y*2.3)*0.02;
    pos.setZ(i, h);
  }
  pos.needsUpdate = true; sandGeo.computeVertexNormals();

  const sandMat = new THREE.MeshStandardMaterial({ color: 0xb8895a, roughness: 0.95, metalness: 0 });
  sandMat.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = causticsUniforms.uTime;
    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\nvarying vec2 vSandUv; varying vec3 vNormal;`);
    sh.vertexShader = sh.vertexShader.replace('#include <begin_vertex>', `#include <begin_vertex>\nvSandUv = uv; vNormal = normalize(normalMatrix * normal);`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <common>', `#include <common>\nvarying vec2 vSandUv; varying vec3 vNormal; uniform float uTime;\nfloat ch(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} float cnoise(vec2 p){vec2 i=floor(p),f=fract(p);return mix(mix(ch(i),ch(i+vec2(1,0)),f.x),mix(ch(i+vec2(0,1)),ch(i+vec2(1,1)),f.x),f.y);} float fbm(vec2 p){float v=0.,a=0.5;for(int i=0;i<4;i++){v+=a*cnoise(p);p*=2.1;a*=0.5;}return v;}\nfloat caustic(vec2 uv, float t){vec2 p = uv*7.0; float a=0.0; for(int i=0;i<4;i++){float fi=float(i);vec2 q=p+vec2(sin(t*0.4+fi*1.7),cos(t*0.35+fi*2.3))*1.2; a += abs(sin(q.x+sin(q.y+t*0.5))+cos(q.y-sin(q.x-t*0.3)))*0.5;} return pow(a/4.0,5.0);}`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <color_fragment>', `#include <color_fragment>\nfloat c = caustic(vSandUv, uTime);\nfloat ripples = sin(vSandUv.x*14.0)*0.5+0.5; ripples *= sin(vSandUv.y*10.0)*0.5+0.5;\nvec3 sandCol = mix(vec3(0.40,0.27,0.14), vec3(0.78,0.60,0.38), ripples*0.45);\ndiffuseColor.rgb = mix(sandCol, vec3(1.0,0.95,0.78), c*0.75);`);
  };
  const sand = new THREE.Mesh(sandGeo, sandMat);
  sand.rotation.x = -Math.PI / 2;
  sand.position.y = waterBottom;
  sand.receiveShadow = true;
  tankGroup.add(sand);
}

// ===========================================================================
// Caustics on back wall + floor edge
// ===========================================================================
{
  const backGeo = new THREE.PlaneGeometry(TANK.w - 0.1, TANK.h - 0.1, 1, 1);
  const backMat = new THREE.MeshStandardMaterial({ color: 0x0c2a3a, roughness: 0.9, metalness: 0 });
  backMat.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = causticsUniforms.uTime;
    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\nvarying vec2 vUvC;`).replace('#include <begin_vertex>', `#include <begin_vertex>\nvUvC = uv;`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <common>', `#include <common>\nvarying vec2 vUvC; uniform float uTime;\nfloat ch2(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);} float cnoise2(vec2 p){vec2 i=floor(p),f=fract(p);return mix(mix(ch2(i),ch2(i+vec2(1,0)),f.x),mix(ch2(i+vec2(0,1)),ch2(i+vec2(1,1)),f.x),f.y);}\nfloat caustic2(vec2 uv, float t){vec2 p = uv*5.0; float a=0.0; for(int i=0;i<3;i++){float fi=float(i);vec2 q=p+vec2(sin(t*0.3+fi*1.3),cos(t*0.25+fi*1.9))*1.0; a += abs(sin(q.x+sin(q.y+t*0.4))+cos(q.y-sin(q.x-t*0.2)))*0.5;} return pow(a/3.0,4.0);}`);
    sh.fragmentShader = sh.fragmentShader.replace('#include <color_fragment>', `#include <color_fragment>\nfloat c = caustic2(vUvC, uTime);\ndiffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.4,0.7,0.85), c*0.4);`);
  };
  const back = new THREE.Mesh(backGeo, backMat);
  back.position.set(0, TANK.baseY + TANK.h/2, -TANK.d/2 + 0.04);
  tankGroup.add(back);
}

// ===========================================================================
// Rocks (procedural with FBM displacement)
// ===========================================================================
function makeRock(scale = 1, color = 0x4a3b30) {
  const g = new THREE.IcosahedronGeometry(0.3 * scale, 2);
  const pos = g.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(pos, i);
    const n = (Math.sin(v.x*4)+Math.cos(v.y*5)+Math.sin(v.z*3)) * 0.07;
    v.multiplyScalar(1 + n);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  g.computeVertexNormals();
  const m = new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05, flatShading: true });
  const mesh = new THREE.Mesh(g, m);
  mesh.castShadow = true; mesh.receiveShadow = true;
  return mesh;
}
const rockPositions = [
  [-2.0, -0.8, 1.4, 0x3a2c22], [-1.4, -0.5, 0.9, 0x4a3a2d], [-2.3,  0.5, 1.0, 0x352a20],
  [ 1.6, -0.6, 1.6, 0x3d2e25], [ 2.1,  0.2, 0.8, 0x4a3a2d], [ 1.9,  0.8, 1.1, 0x352a20],
  [ 0.2, -0.9, 0.7, 0x4a3a2d], [-0.5,  0.9, 0.6, 0x3a2c22]
];
for (const [x, z, s, c] of rockPositions) {
  const r = makeRock(s, c);

function makeSeaweed({ height, color, width, phase = Math.random()*TAU }) {
  const g = new THREE.PlaneGeometry(width, height, 4, 16);
  g.translate(0, height/2, 0);
  const sway = { uTime: { value: 0 }, uPhase: { value: phase }, uHeight: { value: height } };
  const m = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0, side: THREE.DoubleSide });
  m.onBeforeCompile = (sh) => {
    sh.uniforms.uTime = sway.uTime; sh.uniforms.uPhase = sway.uPhase; sh.uniforms.uHeight = sway.uHeight;
    sh.vertexShader = sh.vertexShader.replace('#include <common>', `#include <common>\nuniform float uTime; uniform float uPhase; uniform float uHeight;`)
      .replace('#include <begin_vertex>', `#include <begin_vertex>\nfloat t = clamp(position.y/uHeight, 0.0, 1.0);\nfloat s1 = sin(uTime*1.2 + uPhase + t*2.0) * 0.18 * t;\nfloat s2 = cos(uTime*0.9 + uPhase*0.7 + t*2.5) * 0.10 * t;\ntransformed.x += s1; transformed.z += s2;`);
  };
  const mesh = new THREE.Mesh(g, m);
  mesh.userData.sway = sway;
  return mesh;
}

// Coral (branching)
function makeCoral() {
  const grp = new THREE.Group();
  const coralMat = new THREE.MeshStandardMaterial({ color: 0xff7a4a, roughness: 0.6, metalness: 0.1, emissive: 0x441100, emissiveIntensity: 0.2 });
  const coralMat2 = new THREE.MeshStandardMaterial({ color: 0xff4a8a, roughness: 0.5, metalness: 0.1, emissive: 0x551122, emissiveIntensity: 0.3 });
  const colors = [coralMat, coralMat2];
  function branch(x, y, z, len, depth, mat) {
    const geo = new THREE.CylinderGeometry(len*0.08, len*0.12, len, 6);
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y+len/2, z);
    m.castShadow = true; grp.add(m);
    if (depth > 0) {
      const branches = 2 + Math.floor(Math.random()*2);
      for (let i = 0; i < branches; i++) {
        const a = (i / branches) * TAU + Math.random()*0.5;
        const nx = x + Math.cos(a) * len * 0.5;
        const nz = z + Math.sin(a) * len * 0.5;
        const ny = y + len;
        const nl = len * (0.5 + Math.random()*0.2);
        branch(nx, ny, nz, nl, depth-1, colors[Math.floor(Math.random()*colors.length)]);
      }
    }
  }
  branch(0, 0, 0, 0.4, 3, coralMat);
  return grp;
}

const godRayShader = {
  uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0x9fd8ff) } },
  vertexShader: `varying vec3 vPos; void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `varying vec3 vPos; uniform float uTime; uniform vec3 uColor;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    float n2(vec2 p){vec2 i=floor(p),f=fract(p);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    void main() {
      float h = clamp((vPos.y + 0.5) / 1.0, 0.0, 1.0);
      float radial = 1.0 - length(vPos.xz) * 0.8;
      radial = max(radial, 0.0);

      float a = radial * h * (0.4 + n*0.5);

    }`

// Species palettes
const SPECIES = {
  tetra: { palette: [{body:0x4ad6ff, fin:0x88e8ff},{body:0xff5a2a, fin:0xff8a3a}], bodyScale:[1.0, 0.45, 0.45], tail: 'fan', count: 18, school: true },
  angel: { palette: [{body:0xffe080, fin:0xfff0a0},{body:0xffffff, fin:0xfff5d0}], bodyScale:[0.8, 1.4, 0.35], tail: 'triangle', count: 4, school: false },
  discus: { palette: [{body:0xc04aff, fin:0xddaaff},{body:0x4acaff, fin:0x88e8ff}], bodyScale:[0.7, 1.1, 0.25], tail: 'triangle', count: 3, school: false }
};

function makeFishMesh(species, palette) {
  const g = new THREE.Group();
  const s = species.bodyScale;
  // body (scaled sphere)
  const bodyMat = new THREE.MeshStandardMaterial({ color: palette.body, roughness: 0.45, metalness: 0.2, iridescence: 0.4, iridescenceIOR: 1.3 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 12), bodyMat);
  body.scale.set(s[0], s[1], s[2]);
  // apply stripes via vertex colors for clownfish-like pattern
  if (species === SPECIES.tetra && palette.body === 0xff5a2a) {
    const colors = new Float32Array(body.geometry.attributes.position.count * 3);
    const pos = body.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const isWhite = Math.sin(x * 25) > 0.3;
      colors[i*3+0] = isWhite ? 1 : 1;
      colors[i*3+1] = isWhite ? 1 : 0.35;
      colors[i*3+2] = isWhite ? 1 : 0.16;
    }
    body.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    bodyMat.vertexColors = true;
  }
  g.add(body);
  // tail
  const tailShape = new THREE.Shape();
  if (species.tail === 'fan') {
    tailShape.moveTo(0, 0); tailShape.quadraticCurveTo(-0.12, 0.12, -0.18, 0.05);
    tailShape.quadraticCurveTo(-0.18, -0.05, -0.12, -0.12); tailShape.lineTo(0, 0);
  } else {
    tailShape.moveTo(0, 0); tailShape.lineTo(-0.12, 0.10); tailShape.lineTo(-0.18, 0);
    tailShape.lineTo(-0.12, -0.10); tailShape.lineTo(0, 0);
  }
  const tail = new THREE.Mesh(new THREE.ShapeGeometry(tailShape), new THREE.MeshStandardMaterial({ color: palette.fin, roughness: 0.6, side: THREE.DoubleSide, transparent: true, opacity: 0.9 }));
  tail.position.x = -0.12 * s[0]; tail.rotation.y = Math.PI/2; tail.name = 'tail';
  g.add(tail);
  // top fin
  const finShape = new THREE.Shape();
  finShape.moveTo(0, 0); finShape.lineTo(-0.08, 0.06); finShape.lineTo(0.02, 0.1); finShape.lineTo(0.05, 0); finShape.lineTo(0, 0);
  const topFin = new THREE.Mesh(new THREE.ShapeGeometry(finShape), new THREE.MeshStandardMaterial({ color: palette.fin, roughness: 0.6, side: THREE.DoubleSide, transparent: true, opacity: 0.92 }));
  topFin.position.set(-0.02, 0.1*s[1], 0); topFin.rotation.x = -Math.PI/2;
  g.add(topFin);
  // eyes
  const eyeWhite = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
  const eye = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.9 });
  for (const z of [0.06*s[2], -0.06*s[2]]) {
    const w = new THREE.Mesh(new THREE.SphereGeometry(0.022, 8, 6), eyeWhite); w.position.set(0.13*s[0], 0.04*s[1], z); g.add(w);
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 6), eye); e.position.set(0.15*s[0], 0.04*s[1], z*1.05); g.add(e);
  }
  return g;
}

class Fish {
  constructor(species, palette, isLeader) {
    this.species = species;
    this.mesh = makeFishMesh(species, palette);
    this.tail = this.mesh.children.find(c => c.name === 'tail');
    this.scale = 0.5 + Math.random()*0.7;
    this.mesh.scale.setScalar(this.scale);
    this.pos = new THREE.Vector3(rand(-2, 2), waterBottom + 0.5 + Math.random()*(TANK.h-1.0), rand(-1, 1));
    this.vel = new THREE.Vector3(rand(-0.2, 0.2), 0, rand(-0.2, 0.2));
    this.maxSpeed = isLeader ? 0.5 : 0.35;
    this.phase = Math.random() * TAU;
    this.tailPhase = Math.random() * TAU;
    this.fedTarget = null;
    this.fedTimer = 0;
    this.isLeader = isLeader;
    this.school = species.school;
    this.speciesRef = species;
    this.mesh.userData.fish = this; // for raycast picking
  }
  update(dt, t, allFish, food) {
    // Tail wag
    if (this.tail) this.tail.rotation.y = Math.PI/2 + Math.sin(t*9 + this.tailPhase)*0.55;
    // Body subtle deformation
    this.mesh.position.copy(this.pos);
    // Slight body wave
    this.mesh.rotation.z = Math.sin(t*7 + this.tailPhase)*0.05;
    // Food seeking
    if (this.fedTarget) {
      const d = new THREE.Vector3().subVectors(this.fedTarget, this.pos);
      const dist = d.length();
      if (dist < 0.1) { this.fedTimer -= dt; if (this.fedTimer <= 0) this.fedTarget = null; }
      else { d.normalize().multiplyScalar(this.maxSpeed*1.8); this.vel.lerp(d, 0.1); }
    } else if (food && food.active) {
      const d = new THREE.Vector3().subVectors(food.pos, this.pos);
      if (d.length() < 1.2) { d.normalize().multiplyScalar(this.maxSpeed*1.5); this.vel.lerp(d, 0.05); }
    } else if (this.school) {
      // Boids
      const sep = new THREE.Vector3(), ali = new THREE.Vector3(), coh = new THREE.Vector3();
      let n = 0;
      for (const o of allFish) {
        if (o === this || !o.school) continue;
        const d = new THREE.Vector3().subVectors(this.pos, o.pos);
        const dist = d.length();
        if (dist < 0.5 && dist > 0.001) sep.add(d.normalize().divideScalar(dist));
        if (dist < 1.2) { ali.add(o.vel); coh.add(o.pos); n++; }
      }
      if (n > 0) { ali.divideScalar(n).sub(this.vel).clampLength(0, 0.04); coh.divideScalar(n).sub(this.pos).clampLength(0, 0.03); }
      this.vel.add(sep.multiplyScalar(0.08)).add(ali).add(coh);
    } else {
      // Wander
      this.vel.x += Math.sin(t*0.3 + this.phase) * 0.01;
      this.vel.z += Math.cos(t*0.27 + this.phase) * 0.01;
    }
    // Bounds
    const bx = (TANK.w/2 - 0.4), bz = (TANK.d/2 - 0.3);
    if (this.pos.x > bx) this.vel.x -= 0.04;
    if (this.pos.x < -bx) this.vel.x += 0.04;
    if (this.pos.z > bz) this.vel.z -= 0.04;
    if (this.pos.z < -bz) this.vel.z += 0.04;
    if (this.pos.y < waterBottom+0.2) this.vel.y += 0.03;
    if (this.pos.y > waterTop-0.3) this.vel.y -= 0.03;
    this.vel.clampLength(0, this.maxSpeed);
    this.pos.addScaledVector(this.vel, dt*5);
    // Face direction
    const v = this.vel.clone();
    if (v.lengthSq() > 0.001) {
      const lookAt = this.pos.clone().add(v);
      this.mesh.lookAt(lookAt);
    }
  }
}

const fxShader = {
  uniforms: { tDiffuse: { value: null }, uTime: { value: 0 }, uCA: { value: 0.002 }, uVignette: { value: 0.7 } },
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `uniform sampler2D tDiffuse; uniform float uTime; uniform float uCA; uniform float uVignette; varying vec2 vUv;
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main() {
      vec2 uv = vUv;
      vec2 c = uv - 0.5;
      // chromatic aberration
      float r = texture2D(tDiffuse, uv + c*uCA).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - c*uCA).b;
      vec3 col = vec3(r, g, b);
      // vignette
      float v = smoothstep(0.85, 0.3, length(c));
      col *= mix(1.0, v, uVignette);
      // grain
      float n = hash(uv * 1000.0 + uTime) - 0.5;
      col += n * 0.025;
      gl_FragColor = vec4(col, 1.0);
    }`
};
const fxPass = new ShaderPass(fxShader);

let audioCtx = null, masterGain = null, audioOn = false;
function startAudio() {
  if (audioOn) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.0; masterGain.connect(audioCtx.destination);
  // ambient: filtered noise
  const bufSize = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * 0.5;
  const noise = audioCtx.createBufferSource(); noise.buffer = buf; noise.loop = true;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400; lp.Q.value = 1.2;
  const g = audioCtx.createGain(); g.gain.value = 0.3;
  noise.connect(lp); lp.connect(g); g.connect(masterGain); noise.start();
  // low drone
  const osc = audioCtx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 55;
  const og = audioCtx.createGain(); og.gain.value = 0.04;
  osc.connect(og); og.connect(masterGain); osc.start();
  audioOn = true;
}
function setAudioOn(on) {
  if (on && !audioOn) startAudio();
  if (audioCtx && masterGain) {
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(on ? 0.5 : 0, audioCtx.currentTime + 0.4);
  }
}
function playPop() {
  if (!audioOn) return;
  const o = audioCtx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(900, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.12);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 0.2);
}

// ===========================================================================
// Modes
// ===========================================================================
let mode = 'orbit';
let modeState = { t: 0, target: new THREE.Vector3(0, 1.6, 0), focusFish: null, focusTimer: 0 };
function setMode(m) {
  mode = m;
  document.querySelectorAll('[data-mode]').forEach(p => p.classList.toggle('active', p.dataset.mode === m));
  if (m !== 'dive') { controls.minDistance = 2.5; controls.maxDistance = 16; }
  if (m === 'dive') {
    toast('Режим «внутрь» — свайпай и смотри');
    controls.minDistance = 0.3; controls.maxDistance = 4;
    camera.position.set(0, waterTop - 0.4, 0);
    controls.target.set(0, waterBottom + 0.5, 0.5);
  } else {
    controls.target.set(0, 1.6, 0);
  }
  modeState.focusFish = null;
}
let isDay = true;
function toggleDay() {
  isDay = !isDay;
  document.querySelector('[data-action="day"]').classList.toggle('active', !isDay);
  toast(isDay ? 'День' : 'Ночь');
}
let isAudio = false;
function toggleAudio() {
  isAudio = !isAudio;
  document.querySelector('[data-action="audio"]').classList.toggle('active', isAudio);
  setAudioOn(isAudio);
}
function feed() {
  // spawn food at random x/z
  food.pos.set(rand(-TANK.w/2+0.5, TANK.w/2-0.5), waterTop-0.2, rand(-TANK.d/2+0.4, TANK.d/2-0.4));
  food.active = true;
  food.particles.visible = true;
  // reset food particles to position
  const arr = food.particles.geometry.attributes.position.array;
  for (let i = 0; i < arr.length; i+=3) { arr[i]=food.pos.x; arr[i+1]=food.pos.y; arr[i+2]=food.pos.z; }
  food.particles.geometry.attributes.position.needsUpdate = true;
  // direct each fish to food
  fishes.forEach(f => { f.fedTarget = food.pos.clone(); f.fedTimer = 8; });
  playPop();
  toast('Покормил!');
}
document.querySelectorAll('[data-mode]').forEach(p => p.addEventListener('click', () => setMode(p.dataset.mode)));
document.querySelectorAll('[data-action]').forEach(p => p.addEventListener('click', () => {
  const a = p.dataset.action;
  if (a === 'feed') feed();
  if (a === 'day') toggleDay();
  if (a === 'audio') toggleAudio();
}));

const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg) { toastEl.textContent = msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600); }

// Click to focus a fish
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  // collect fish meshes
  const fishMeshes = fishes.map(f => f.mesh);
  const intersects = raycaster.intersectObjects(fishMeshes, true);
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj && !obj.userData.fish) obj = obj.parent;
    if (obj && obj.userData.fish) {
      modeState.focusFish = obj.userData.fish;
      modeState.focusTimer = 6;
      toast('Следим за рыбкой');
    }
  }
});

// ===========================================================================
// Animation loop
// ===========================================================================
const clock = new THREE.Clock();
let frame = 0; let fpsTime = 0; let trisEl = document.getElementById('s-tris'); let fpsEl = document.getElementById('s-fps');

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // Update uniforms
  causticsUniforms.uTime.value = t;
  godRayShader.uniforms.uTime.value = t;
  planktonMat.uniforms.uTime.value = t;
  fxPass.uniforms.uTime.value = t;
  const surface = tankGroup.userData.surface;
  if (surface && surface.material.userData.shader) surface.material.userData.shader.uniforms.uTime.value = t;
  for (const sw of seaweeds) sw.userData.sway.uTime.value = t;

  // Day/night
  const dayTarget = isDay ? 1.0 : 0.25;
  key.intensity = lerp(key.intensity, dayTarget * 1.3, 0.02);
  scene.fog.color.lerp(new THREE.Color(isDay ? 0x0a2030 : 0x000810), 0.02);
  scene.background.lerp(new THREE.Color(isDay ? 0x050a10 : 0x000204), 0.02);
  rim.color.lerp(new THREE.Color(isDay ? 0x4dccff : 0x402060), 0.02);

  // Bubbles physics
  for (let i = 0; i < BUBBLE_COUNT; i++) {
    const b = bubbleData[i];
    b.vx += Math.sin(t*0.8 + b.wobblePhase) * 0.005;
    b.vz += Math.cos(t*0.7 + b.wobblePhase) * 0.005;
    b.vy *= 0.99; b.vy += 0.01; // slight buoyancy
    b.x += b.vx * dt * 5;
    b.y += b.vy * dt * 5;
    b.z += b.vz * dt * 5;
    if (b.y > waterTop - 0.05 || b.x > TANK.w/2-0.1 || b.x < -TANK.w/2+0.1 || b.z > TANK.d/2-0.1 || b.z < -TANK.d/2+0.1) {
      b.x = filterX + rand(-0.05, 0.05);
      b.y = waterBottom + 0.1;
      b.z = filterZ + rand(-0.05, 0.05);
      b.vx = rand(-0.02, 0.02); b.vy = rand(0.15, 0.45); b.vz = rand(-0.02, 0.02);
    }
    tmpObj.position.set(b.x, b.y, b.z);
    tmpObj.scale.setScalar(b.r);
    tmpObj.updateMatrix();
    bubbles.setMatrixAt(i, tmpObj.matrix);
  }
  bubbles.instanceMatrix.needsUpdate = true;

  // Fish
  for (const f of fishes) f.update(dt, t, fishes, food);

  // Food particles fall + fade
  if (food.active) {
    const arr = food.particles.geometry.attributes.position.array;
    for (let i = 0; i < arr.length; i += 3) {
      arr[i+1] -= 0.4 * dt;
      arr[i] += Math.sin(t*2 + i) * 0.005;
      arr[i+2] += Math.cos(t*2.3 + i) * 0.005;
      if (arr[i+1] < waterBottom + 0.1) arr[i+1] = waterBottom + 0.1;
    }
    food.particles.geometry.attributes.position.needsUpdate = true;
    food.pos.y -= 0.4 * dt;
    if (food.pos.y < waterBottom + 0.2) {
      food.active = false; food.particles.visible = false;
    }
  }

  // Camera modes
  if (mode === 'auto') {
    modeState.t += dt * 0.12;
    const r = 8;
    camera.position.set(Math.cos(modeState.t)*r, 3.5+Math.sin(modeState.t*0.5)*1.5, Math.sin(modeState.t)*r);
    camera.lookAt(0, 1.6, 0); controls.target.set(0, 1.6, 0);
  } else if (modeState.focusFish) {
    modeState.focusTimer -= dt;
    if (modeState.focusTimer <= 0) modeState.focusFish = null;
    else {
      const f = modeState.focusFish;
      const offset = new THREE.Vector3(0.6, 0.2, 0.6);
      camera.position.lerp(f.pos.clone().add(offset), 0.04);
      controls.target.lerp(f.pos, 0.1);
    }
    controls.update();
  } else {
    controls.update();
  }

  composer.render();

  // FPS + tri count
  frame++; fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsEl.textContent = Math.round(frame/fpsTime);
    frame = 0; fpsTime = 0;
    trisEl.textContent = renderer.info.render.triangles.toLocaleString();
  }
  requestAnimationFrame(animate);
}

requestAnimationFrame(() => {
  composer.render();
  document.getElementById('loader').classList.add('hidden');
  setTimeout(() => document.getElementById('loader').remove(), 900);
  animate();
});

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h); composer.setSize(w, h); bloom.setSize(w, h);
});
</script>
</body>
