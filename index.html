<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D Aquarium</title>
<style>
  :root {
    --ink: #eaf3ff;
    --ink-dim: #9fb6c9;
    --accent: #6ad6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .hud {
    position: fixed;
    pointer-events: none;
    user-select: none;
    z-index: 5;
  }
  .hud-tl {
    top: 22px; left: 24px;
    max-width: 360px;
  }
  .hud-tl .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(8, 18, 28, 0.55);
    border: 1px solid rgba(106, 214, 255, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .hud-tl .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .hud-tl h1 {
    margin-top: 10px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .hud-tl h1 span {
    background: linear-gradient(90deg, #6ad6ff 0%, #b6f0ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hud-tl p {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.5;
  }

  .hud-tr {
    top: 22px; right: 24px;
    display: flex; gap: 8px;
    pointer-events: auto;
  }
  .pill {
    pointer-events: auto;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(8, 18, 28, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ink);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .pill:hover {
    border-color: rgba(106, 214, 255, 0.4);
    color: var(--accent);
  }
  .pill.active {
    background: rgba(106, 214, 255, 0.12);
    border-color: rgba(106, 214, 255, 0.5);
    color: var(--accent);
  }

  .hud-br {
    bottom: 22px; right: 24px;
    font-size: 11px;
    color: var(--ink-dim);
    text-align: right;
    line-height: 1.6;
    letter-spacing: 0.04em;
  }
  .hud-br kbd {
    font-family: inherit;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    color: var(--ink);
  }

  .hud-bl {
    bottom: 22px; left: 24px;
    display: flex; gap: 6px; align-items: center;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: rgba(8, 18, 28, 0.55);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 8px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .stat b { color: var(--ink); font-weight: 500; }

  .loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0a1620 0%, #000 100%);
    z-index: 10;
    transition: opacity 0.8s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 48px; height: 48px;
    border: 2px solid rgba(106, 214, 255, 0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="loader" id="loader"><div class="loader-ring"></div></div>

  <div class="hud hud-tl">
    <div class="badge"><span class="dot"></span> Live · 60 fps</div>
    <h1>Аквариум <span>real-time</span></h1>
    <p>Процедурная сцена на WebGL: стекло с преломлением, рыбы, пузырьки, каустика на дне.</p>
  </div>

  <div class="hud hud-tr">
    <button class="pill" data-mode="orbit">Осмотр</button>
    <button class="pill" data-mode="auto">Авто-тур</button>
    <button class="pill" data-mode="feed">Покормить</button>
  </div>

  <div class="hud hud-bl" id="stats">
    <div class="stat">Рыбок <b id="s-fish">—</b></div>
    <div class="stat">Пузырьков <b id="s-bubbles">—</b></div>
    <div class="stat">FPS <b id="s-fps">—</b></div>
  </div>

  <div class="hud hud-br">
    <kbd>ЛКМ</kbd> вращать &nbsp; <kbd>колесо</kbd> зум &nbsp; <kbd>ПКМ</kbd> пан
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---------------------------------------------------------------------------
// Renderer + scene
// ---------------------------------------------------------------------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a10);
scene.fog = new THREE.FogExp2(0x051a26, 0.045);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(7, 4.5, 9);
camera.lookAt(0, 1.5, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 1.5, 0);
controls.minDistance = 3;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minPolarAngle = Math.PI * 0.18;

// ---------------------------------------------------------------------------
// World: floor, walls, table
// ---------------------------------------------------------------------------
const roomGroup = new THREE.Group();
scene.add(roomGroup);

// Dark wood floor (outside the tank)
{
  const g = new THREE.PlaneGeometry(40, 40);
  const m = new THREE.MeshStandardMaterial({
    color: 0x1a120c,
    roughness: 0.85,
    metalness: 0.0
  });
  const floor = new THREE.Mesh(g, m);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.001;
  floor.receiveShadow = true;
  roomGroup.add(floor);
}

// Wooden stand for the tank
{
  const standMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.6, metalness: 0.05 });
  const top = new THREE.Mesh(new THREE.BoxGeometry(6.4, 0.18, 3.2), standMat);
  top.position.y = 0.09;
  top.castShadow = true;
  top.receiveShadow = true;
  roomGroup.add(top);

  const legGeo = new THREE.BoxGeometry(0.22, 1.4, 0.22);
  const positions = [[-3, 0.7, -1.45], [3, 0.7, -1.45], [-3, 0.7, 1.45], [3, 0.7, 1.45]];
  for (const [x, y, z] of positions) {
    const leg = new THREE.Mesh(legGeo, standMat);
    leg.position.set(x, y, z);
    leg.castShadow = true;
    roomGroup.add(leg);
  }
}

// ---------------------------------------------------------------------------
// Aquarium tank (glass)
// ---------------------------------------------------------------------------
const TANK = { w: 5.4, h: 3.2, d: 2.6, baseY: 0.18 };
const waterTop = TANK.baseY + TANK.h;
const waterBottom = TANK.baseY + 0.05;

const tankGroup = new THREE.Group();
tankGroup.position.set(0, 0, 0);
scene.add(tankGroup);

// glass material — needs envMap (set above) for transmission to look right
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xb8e6ff,
  transmission: 1.0,
  thickness: 0.4,
  roughness: 0.02,
  metalness: 0.0,
  ior: 1.5,
  attenuationColor: new THREE.Color(0xa0d8ff),
  attenuationDistance: 6.0,
  clearcoat: 0.4,
  clearcoatRoughness: 0.05,
  envMapIntensity: 1.0,
  transparent: true,
  side: THREE.DoubleSide
});

// Inner water volume (slightly smaller, used for fog and clipping reference)
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x1f5f7a,
  transmission: 0.95,
  thickness: 1.2,
  roughness: 0.05,
  metalness: 0,
  ior: 1.33,
  attenuationColor: new THREE.Color(0x0a3a55),
  attenuationDistance: 3.5,
  transparent: true,
  side: THREE.BackSide,
  envMapIntensity: 0.6
});

// Tank walls (5 faces; bottom = sand/floor)
{
  const t = 0.04; // wall thickness visual
  // left
  const g = new THREE.BoxGeometry(t, TANK.h, TANK.d);
  const m = new THREE.Mesh(g, glassMat);
  m.position.set(-TANK.w / 2, TANK.baseY + TANK.h / 2, 0);
  tankGroup.add(m);
  // right
  const m2 = m.clone();
  m2.position.x = TANK.w / 2;
  tankGroup.add(m2);
  // back
  const gb = new THREE.BoxGeometry(TANK.w, TANK.h, t);
  const mb = new THREE.Mesh(gb, glassMat);
  mb.position.set(0, TANK.baseY + TANK.h / 2, -TANK.d / 2);
  tankGroup.add(mb);
  // front
  const mf = mb.clone();
  mf.position.z = TANK.d / 2;
  tankGroup.add(mf);
  // top (open? we'll close it for the "closed top" look — but transmission renders fine with double-side)
  const gt = new THREE.BoxGeometry(TANK.w, t, TANK.d);
  const mt = new THREE.Mesh(gt, glassMat);
  mt.position.set(0, TANK.baseY + TANK.h, 0);
  tankGroup.add(mt);
}

// Water volume — slightly smaller box, no top face visually
{
  const innerW = TANK.w - 0.12, innerH = TANK.h - 0.05, innerD = TANK.d - 0.12;
  const g = new THREE.BoxGeometry(innerW, innerH, innerD);
  const m = new THREE.Mesh(g, waterMat);
  m.position.set(0, TANK.baseY + innerH / 2 + 0.04, 0);
  m.renderOrder = -1;
  tankGroup.add(m);
}

// Subtle frame around the tank edges
{
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1a1410, roughness: 0.5, metalness: 0.3 });
  const e = 0.06;
  // top + bottom rectangles
  const topBack = new THREE.Mesh(new THREE.BoxGeometry(TANK.w + e * 2, e, e), frameMat);
  topBack.position.set(0, TANK.baseY + TANK.h + e / 2, -TANK.d / 2 - e / 2);
  tankGroup.add(topBack);
  const topFront = topBack.clone(); topFront.position.z = TANK.d / 2 + e / 2; tankGroup.add(topFront);
  const topL = new THREE.Mesh(new THREE.BoxGeometry(e, e, TANK.d + e * 2), frameMat);
  topL.position.set(-TANK.w / 2 - e / 2, TANK.baseY + TANK.h + e / 2, 0); tankGroup.add(topL);
  const topR = topL.clone(); topR.position.x = TANK.w / 2 + e / 2; tankGroup.add(topR);
  const topT = new THREE.Mesh(new THREE.BoxGeometry(TANK.w + e * 2, e, TANK.d + e * 2), frameMat);
  topT.position.set(0, TANK.baseY + TANK.h + e / 2, 0); tankGroup.add(topT);
}

// ---------------------------------------------------------------------------
// Sand floor + caustics shader
// ---------------------------------------------------------------------------
const sandGeo = new THREE.PlaneGeometry(TANK.w - 0.1, TANK.d - 0.1, 80, 40);
// displace for slight dunes
{
  const pos = sandGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i);
    const h = Math.sin(x * 1.5) * 0.05 + Math.cos(y * 2.0) * 0.04 + Math.sin(x * 3.1 + y * 2.3) * 0.02;
    pos.setZ(i, h);
  }
  pos.needsUpdate = true;
  sandGeo.computeVertexNormals();
}

const causticsUniforms = {
  uTime: { value: 0 },
  uColor: { value: new THREE.Color(0xf5d6a0) },
  uDeep: { value: new THREE.Color(0x8a6230) }
};

const sandMat = new THREE.MeshStandardMaterial({
  color: 0xb8895a,
  roughness: 0.95,
  metalness: 0
});
sandMat.onBeforeCompile = (shader) => {
  shader.uniforms.uTime = causticsUniforms.uTime;
  shader.uniforms.uColor = causticsUniforms.uColor;
  shader.uniforms.uDeep = causticsUniforms.uDeep;
  shader.vertexShader = shader.vertexShader.replace(
    '#include <common>',
    `#include <common>
     varying vec2 vSandUv;`
  ).replace(
    '#include <uv_vertex>',
    `#include <uv_vertex>
     vSandUv = uv;`
  );
  shader.fragmentShader = shader.fragmentShader.replace(
    '#include <common>',
    `#include <common>
     varying vec2 vSandUv;
     uniform float uTime;
     uniform vec3 uColor;
     uniform vec3 uDeep;
     // caustic pattern
     float caustic(vec2 uv, float t) {
       vec2 p = uv * 6.0;
       float a = 0.0;
       for (int i = 0; i < 3; i++) {
         float fi = float(i);
         vec2 q = p + vec2(sin(t * 0.4 + fi * 1.7), cos(t * 0.35 + fi * 2.3)) * 1.2;
         a += abs(sin(q.x + sin(q.y + t * 0.5)) + cos(q.y - sin(q.x - t * 0.3))) * 0.5;
       }
       return pow(a / 3.0, 4.0);
     }`
  ).replace(
    '#include <color_fragment>',
    `#include <color_fragment>
     float c = caustic(vSandUv, uTime);
     vec3 sand = mix(uDeep, uColor, 0.5 + 0.5 * sin(vSandUv.x * 8.0) * sin(vSandUv.y * 6.0));
     diffuseColor.rgb = mix(sand, vec3(1.0, 0.95, 0.78), c * 0.65);`
  );
};

const sand = new THREE.Mesh(sandGeo, sandMat);
sand.rotation.x = -Math.PI / 2;
sand.position.y = waterBottom;
sand.receiveShadow = true;
tankGroup.add(sand);

// ---------------------------------------------------------------------------
// Rocks
// ---------------------------------------------------------------------------
function makeRock(scale = 1, color = 0x4a3b30) {
  const g = new THREE.IcosahedronGeometry(0.3 * scale, 1);
  const pos = g.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(pos, i);
    const n = (Math.sin(v.x * 4) + Math.cos(v.y * 5) + Math.sin(v.z * 3)) * 0.06;
    v.multiplyScalar(1 + n);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  g.computeVertexNormals();
  const m = new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05, flatShading: true });
  const mesh = new THREE.Mesh(g, m);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

const rockPositions = [
  [-2.0, 0,  -0.8, 1.4, 0x3a2c22],
  [-1.4, 0,  -0.5, 0.9, 0x4a3a2d],
  [-2.3, 0,   0.5, 1.0, 0x352a20],
  [ 1.6, 0,  -0.6, 1.6, 0x3d2e25],
  [ 2.1, 0,   0.2, 0.8, 0x4a3a2d],
  [ 1.9, 0,   0.8, 1.1, 0x352a20],
  [ 0.2, 0,  -0.9, 0.7, 0x4a3a2d],
  [-0.5, 0,   0.9, 0.6, 0x3a2c22],
];
for (const [x, y, z, s, c] of rockPositions) {
  const r = makeRock(s, c);
  r.position.set(x, waterBottom + 0.05 * s, z);
  r.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  tankGroup.add(r);
}

// ---------------------------------------------------------------------------
// Plants (seaweed) — animated via vertex shader sway
// ---------------------------------------------------------------------------
function makeSeaweed({ height = 1.2, segments = 12, color = 0x2a8a3a, width = 0.08 }) {
  const g = new THREE.PlaneGeometry(width, height, 4, segments);
  g.translate(0, height / 2, 0);
  const sway = { uTime: { value: 0 }, uPhase: { value: Math.random() * Math.PI * 2 } };
  const m = new THREE.MeshStandardMaterial({
    color, roughness: 0.7, metalness: 0, side: THREE.DoubleSide, transparent: true, alphaTest: 0.0
  });
  m.onBeforeCompile = (shader) => {
    shader.uniforms.uTime = sway.uTime;
    shader.uniforms.uPhase = sway.uPhase;
    shader.vertexShader = shader.vertexShader.replace(
      '#include <common>',
      `#include <common>
       uniform float uTime;
       uniform float uPhase;`
    ).replace(
      '#include <begin_vertex>',
      `#include <begin_vertex>
       float t = position.y;
       float sway = sin(uTime * 1.3 + uPhase + t * 1.5) * 0.12 * t;
       float sway2 = cos(uTime * 0.9 + uPhase * 0.7 + t * 2.1) * 0.06 * t;
       transformed.x += sway;
       transformed.z += sway2;`
    );
  };
  const mesh = new THREE.Mesh(g, m);
  mesh.userData.sway = sway;
  mesh.castShadow = false;
  return mesh;
}

const seaweedColors = [0x1f7a2a, 0x2a8a3a, 0x1c5a3a, 0x3aaa4a, 0x1a4a2a, 0x4ab070];
const seaweedPlanted = [];
for (let i = 0; i < 28; i++) {
  const h = 0.6 + Math.random() * 1.8;
  const w = 0.05 + Math.random() * 0.05;
  const sw = makeSeaweed({ height: h, segments: 14, color: seaweedColors[i % seaweedColors.length], width: w });
  const x = (Math.random() - 0.5) * (TANK.w - 0.3);
  const z = (Math.random() - 0.5) * (TANK.d - 0.3);
  sw.position.set(x, waterBottom + 0.02, z);
  sw.rotation.y = Math.random() * Math.PI;
  tankGroup.add(sw);
  seaweedPlanted.push(sw);
}

// ---------------------------------------------------------------------------
// Bubbles
// ---------------------------------------------------------------------------
const BUBBLE_COUNT = 220;
const bubbleGeo = new THREE.BufferGeometry();
const bubblePos = new Float32Array(BUBBLE_COUNT * 3);
const bubbleSize = new Float32Array(BUBBLE_COUNT);
const bubbleSpeed = new Float32Array(BUBBLE_COUNT);
const bubblePhase = new Float32Array(BUBBLE_COUNT);

for (let i = 0; i < BUBBLE_COUNT; i++) {
  bubblePos[i * 3 + 0] = (Math.random() - 0.5) * (TANK.w - 0.4);
  bubblePos[i * 3 + 1] = waterBottom + Math.random() * (TANK.h - 0.2);
  bubblePos[i * 3 + 2] = (Math.random() - 0.5) * (TANK.d - 0.3);
  bubbleSize[i] = 0.04 + Math.random() * 0.10;
  bubbleSpeed[i] = 0.15 + Math.random() * 0.45;
  bubblePhase[i] = Math.random() * Math.PI * 2;
}
bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
bubbleGeo.setAttribute('aSize', new THREE.BufferAttribute(bubbleSize, 1));
bubbleGeo.setAttribute('aPhase', new THREE.BufferAttribute(bubblePhase, 1));

const bubbleMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.NormalBlending,
  uniforms: {
    uTime: { value: 0 }
  },
  vertexShader: `
    attribute float aSize;
    attribute float aPhase;
    uniform float uTime;
    varying float vAlpha;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 1.5 + aPhase) * 0.04;
      p.z += cos(uTime * 1.2 + aPhase * 1.3) * 0.04;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_PointSize = aSize * 300.0 / -mv.z;
      gl_Position = projectionMatrix * mv;
      // fade near top
      float y = position.y;
      vAlpha = smoothstep(${waterTop.toFixed(2)}, ${(waterTop - 0.4).toFixed(2)}, y) * 0.6;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float ring = smoothstep(0.5, 0.45, d);
      float core = smoothstep(0.4, 0.0, d) * 0.15;
      vec3 col = mix(vec3(0.85, 0.95, 1.0), vec3(1.0), core);
      gl_FragColor = vec4(col, ring * vAlpha);
    }
  `
});
const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
tankGroup.add(bubbles);

// small rising bubble streams near a "filter" tube
const filterX = TANK.w / 2 - 0.25;
const filterZ = 0;
{
  const filterMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.6 });
  const filter = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, TANK.h - 0.2, 16), filterMat);
  filter.position.set(filterX, TANK.baseY + TANK.h / 2 + 0.05, filterZ);
  tankGroup.add(filter);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5, metalness: 0.4 }));
  cap.position.set(filterX, TANK.baseY + TANK.h - 0.05, filterZ);
  tankGroup.add(cap);
}

// ---------------------------------------------------------------------------
// Fish — procedural geometry, swim along curved paths
// ---------------------------------------------------------------------------
const fishColors = [
  { body: 0xff5a2a, fin: 0xff8a3a, name: 'clown' },
  { body: 0x2a7aff, fin: 0x6ab0ff, name: 'blue' },
  { body: 0xffd24a, fin: 0xffe080, name: 'yellow' },
  { body: 0x6affb0, fin: 0xaaffe0, name: 'mint' },
  { body: 0xc24aff, fin: 0xe0aaff, name: 'violet' },
  { body: 0xffffff, fin: 0xff6a6a, name: 'angel' },
];

function makeFishMesh(palette) {
  const g = new THREE.Group();

  // Body — ellipsoid via scaled sphere
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 16, 12),
    new THREE.MeshStandardMaterial({ color: palette.body, roughness: 0.5, metalness: 0.15 })
  );
  body.scale.set(1.6, 0.9, 0.8);
  g.add(body);

  // Tail
  const tailShape = new THREE.Shape();
  tailShape.moveTo(0, 0);
  tailShape.lineTo(-0.12, 0.1);
  tailShape.lineTo(-0.18, 0);
  tailShape.lineTo(-0.12, -0.1);
  tailShape.lineTo(0, 0);
  const tailGeo = new THREE.ShapeGeometry(tailShape);
  const tail = new THREE.Mesh(tailGeo, new THREE.MeshStandardMaterial({ color: palette.fin, roughness: 0.6, side: THREE.DoubleSide, transparent: true, opacity: 0.95 }));
  tail.position.x = -0.19;
  tail.rotation.y = Math.PI / 2;
  tail.name = 'tail';
  g.add(tail);

  // Top fin
  const finShape = new THREE.Shape();
  finShape.moveTo(0, 0);
  finShape.lineTo(-0.08, 0.06);
  finShape.lineTo(0.02, 0.1);
  finShape.lineTo(0.05, 0);
  finShape.lineTo(0, 0);
  const finGeo = new THREE.ShapeGeometry(finShape);
  const topFin = new THREE.Mesh(finGeo, new THREE.MeshStandardMaterial({ color: palette.fin, roughness: 0.6, side: THREE.DoubleSide, transparent: true, opacity: 0.92 }));
  topFin.position.set(-0.02, 0.1, 0);
  topFin.rotation.x = -Math.PI / 2;
  g.add(topFin);

  // Side fins
  const sideFinShape = new THREE.Shape();
  sideFinShape.moveTo(0, 0);
  sideFinShape.lineTo(-0.05, 0.04);
  sideFinShape.lineTo(0.04, 0.07);
  sideFinShape.lineTo(0.06, 0);
  sideFinShape.lineTo(0, 0);
  const sideFinGeo = new THREE.ShapeGeometry(sideFinShape);
  const sideFinL = new THREE.Mesh(sideFinGeo, new THREE.MeshStandardMaterial({ color: palette.fin, roughness: 0.6, side: THREE.DoubleSide, transparent: true, opacity: 0.85 }));
  sideFinL.position.set(0.02, -0.04, 0.09);
  sideFinL.rotation.x = -0.4;
  sideFinL.rotation.z = -0.3;
  g.add(sideFinL);
  const sideFinR = sideFinL.clone();
  sideFinR.position.z = -0.09;
  sideFinR.rotation.x = 0.4;
  g.add(sideFinR);

  // Eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.9 });
  const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
  for (const z of [0.06, -0.06]) {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 6), eyeWhiteMat);
    white.position.set(0.14, 0.04, z);
    g.add(white);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.014, 8, 6), eyeMat);
    eye.position.set(0.16, 0.04, z * 1.05);
    g.add(eye);
  }

  return g;
}

class Fish {
  constructor(palette) {
    this.mesh = makeFishMesh(palette);
    this.tail = this.mesh.children.find(c => c.name === 'tail');
    this.scale = 0.6 + Math.random() * 0.9;
    this.mesh.scale.setScalar(this.scale);
    this.path = this.makePath();
    this.t = Math.random();
    this.speed = 0.04 + Math.random() * 0.05;
    this.tailPhase = Math.random() * Math.PI * 2;
    this.bobAmp = 0.05 + Math.random() * 0.08;
    this.bobSpeed = 0.6 + Math.random() * 0.6;
    this.fedTarget = null;
  }
  makePath() {
    // random elliptical path inside the tank
    const cx = (Math.random() - 0.5) * (TANK.w - 1.0);
    const cz = (Math.random() - 0.5) * (TANK.d - 0.8);
    const rx = 0.8 + Math.random() * (TANK.w / 2 - 0.8);
    const rz = 0.5 + Math.random() * (TANK.d / 2 - 0.5);
    const yBase = waterBottom + 0.5 + Math.random() * (TANK.h - 1.0);
    return { cx, cz, rx, rz, yBase, dir: Math.random() < 0.5 ? 1 : -1, phase: Math.random() * Math.PI * 2 };
  }
  update(dt, time) {
    if (this.fedTarget) {
      // move toward target
      const d = new THREE.Vector3().subVectors(this.fedTarget, this.mesh.position);
      const dist = d.length();
      if (dist < 0.05) { this.fedTarget = null; }
      else {
        d.normalize().multiplyScalar(this.speed * 2.5);
        this.mesh.position.add(d);
        this.mesh.lookAt(this.fedTarget);
      }
    } else {
      this.t += dt * this.speed * this.path.dir;
      const a = this.t * Math.PI * 2;
      const x = this.path.cx + Math.cos(a) * this.path.rx;
      const z = this.path.cz + Math.sin(a) * this.path.rz;
      const y = this.path.yBase + Math.sin(time * this.bobSpeed + this.path.phase) * this.bobAmp;
      this.mesh.position.set(x, y, z);
      // face direction of travel
      const ahead = this.path.dir > 0 ? a + 0.05 : a - 0.05;
      const tx = this.path.cx + Math.cos(ahead) * this.path.rx;
      const tz = this.path.cz + Math.sin(ahead) * this.path.rz;
      this.mesh.lookAt(tx, y, tz);
      // flip if going reverse
      if (this.path.dir < 0) this.mesh.rotateY(Math.PI);
    }
    // tail wag
    if (this.tail) {
      this.tail.rotation.y = Math.PI / 2 + Math.sin(time * 8 + this.tailPhase) * 0.5;
    }
  }
}

const fishes = [];
const FISH_COUNT = 12;
for (let i = 0; i < FISH_COUNT; i++) {
  const palette = fishColors[i % fishColors.length];
  const f = new Fish(palette);
  tankGroup.add(f.mesh);
  fishes.push(f);
}

document.getElementById('s-fish').textContent = FISH_COUNT;
document.getElementById('s-bubbles').textContent = BUBBLE_COUNT;

// ---------------------------------------------------------------------------
// Lighting
// ---------------------------------------------------------------------------
const ambient = new THREE.AmbientLight(0x4a90b8, 0.4);
scene.add(ambient);

// Key light from above (overhead lamp reflection)
const key = new THREE.DirectionalLight(0xeaf6ff, 1.4);
key.position.set(4, 8, 3);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 30;
key.shadow.camera.left = -8;
key.shadow.camera.right = 8;
key.shadow.camera.top = 8;
key.shadow.camera.bottom = -8;
key.shadow.bias = -0.0005;
scene.add(key);

// Fill light from front
const fill = new THREE.DirectionalLight(0x88c0ff, 0.5);
fill.position.set(-4, 5, 6);
scene.add(fill);

// Rim light
const rim = new THREE.PointLight(0x4dccff, 1.2, 20, 1.5);
rim.position.set(0, waterTop + 0.5, 0);
scene.add(rim);

// Aquarium top light strip (visual)
{
  const lampMat = new THREE.MeshStandardMaterial({ color: 0xfff5d0, emissive: 0xffe4a0, emissiveIntensity: 1.0, roughness: 0.4 });
  const lamp = new THREE.Mesh(new THREE.BoxGeometry(TANK.w - 0.3, 0.04, 0.18), lampMat);
  lamp.position.set(0, TANK.baseY + TANK.h + 0.18, 0);
  scene.add(lamp);
  const lamp2 = new THREE.Mesh(new THREE.BoxGeometry(TANK.w - 0.3, 0.04, 0.18), lampMat);
  lamp2.position.set(0, TANK.baseY + TANK.h + 0.18, 0);
  lamp2.rotation.y = Math.PI / 2;
  scene.add(lamp2);
}

// ---------------------------------------------------------------------------
// Postprocessing
// ---------------------------------------------------------------------------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.35, 0.7, 0.85);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ---------------------------------------------------------------------------
// Modes
// ---------------------------------------------------------------------------
let mode = 'orbit';
let autoCam = { t: 0 };
function setMode(m) {
  mode = m;
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.mode === m));
}
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    if (p.dataset.mode === 'feed') {
      // drop food: every fish targets a random food point
      const food = new THREE.Vector3(
        (Math.random() - 0.5) * (TANK.w - 0.6),
        waterBottom + 0.25,
        (Math.random() - 0.5) * (TANK.d - 0.4)
      );
      fishes.forEach(f => f.fedTarget = food);
      setTimeout(() => fishes.forEach(f => f.fedTarget = null), 6000);
      return;
    }
    setMode(p.dataset.mode);
  });
});
setMode('orbit');

// ---------------------------------------------------------------------------
// Animation
// ---------------------------------------------------------------------------
const clock = new THREE.Clock();
let frameCount = 0;
let fpsTime = 0;
const fpsEl = document.getElementById('s-fps');

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // caustics + seaweed sway
  causticsUniforms.uTime.value = t;
  for (const sw of seaweedPlanted) sw.userData.sway.uTime.value = t;
  bubbleMat.uniforms.uTime.value = t;

  // bubble rise
  const bp = bubbleGeo.attributes.position.array;
  for (let i = 0; i < BUBBLE_COUNT; i++) {
    bp[i * 3 + 1] += bubbleSpeed[i] * dt;
    if (bp[i * 3 + 1] > waterTop) {
      bp[i * 3 + 1] = waterBottom + 0.1;
      bp[i * 3 + 0] = filterX + (Math.random() - 0.5) * 0.08;
      bp[i * 3 + 2] = filterZ + (Math.random() - 0.5) * 0.08;
    }
  }
  bubbleGeo.attributes.position.needsUpdate = true;

  // fish
  for (const f of fishes) f.update(dt, t);

  // mode: auto tour
  if (mode === 'auto') {
    autoCam.t += dt * 0.12;
    const r = 8;
    camera.position.set(Math.cos(autoCam.t) * r, 3.5 + Math.sin(autoCam.t * 0.5) * 1.5, Math.sin(autoCam.t) * r);
    camera.lookAt(0, 1.5, 0);
    controls.target.set(0, 1.5, 0);
  } else {
    controls.update();
  }

  composer.render();

  // FPS
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsEl.textContent = Math.round(frameCount / fpsTime);
    frameCount = 0; fpsTime = 0;
  }
  requestAnimationFrame(animate);
}

// Hide loader after first render
requestAnimationFrame(() => {
  composer.render();
  document.getElementById('loader').classList.add('hidden');
  setTimeout(() => document.getElementById('loader').remove(), 900);
  animate();
});

// ---------------------------------------------------------------------------
// Resize
// ---------------------------------------------------------------------------
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bloom.setSize(w, h);
});
</script>
</body>
